<app-brand-header></app-brand-header>

<div class="app-container">
  <app-background-animation></app-background-animation>
  @if (!paymentSuccess()) {
  <div class="checkout-layout">
    <div class="visual-panel">
      <app-visual-display [selectedMethod]="selectedMethod()" [cardType]="cardType()"></app-visual-display>
    </div>

    <div class="form-panel">
      <div class="form-glass-card">
        <app-payment-card (methodChange)="onMethodChange($event)" (cardTypeChange)="onCardTypeChange($event)"
          (paymentSuccess)="onPaymentSuccess()"></app-payment-card>
      </div>
    </div>
  </div>
  } @else {
  <div class="success-layout">
    <app-success-page (return)="onReturnToCheckout()"></app-success-page>
  </div>
  }

  <div class="global-footer">
    <div class="gf-left">
      Trusted by 50,000+ businesses worldwide for secure, instant payments
    </div>
    <div class="gf-right">
      Secured by <strong style="color: gold;">Kuber Financial</strong> &middot; All transactions encrypted
    </div>
  </div>
</div>

<router-outlet />
